name: Build Release

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-15]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: .
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_wheels_arm64:
    name: Build arm64 wheels
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        with:
          output-dir: wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels_arm64
          path: ./wheelhouse/*.whl

  build_wheels_riscv64:
    name: Build riscv64 wheels (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: manylinux
            build: "*manylinux*"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/riscv64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: "riscv64"
          # Build riscv64 wheels against a conservative baseline instead of
          # enabling RVV-related extensions from the build container.
          CIBW_ENVIRONMENT: CMAKE_ARGS="-DGGML_NATIVE=off -DGGML_RVV=off -DGGML_RV_ZFH=off -DGGML_RV_ZVFH=off -DGGML_RV_ZICBOP=off -DGGML_RV_ZIHINTPAUSE=off"
          CIBW_BUILD: ${{ matrix.shard.build }}
        with:
          output-dir: wheelhouse

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels_riscv64_${{ matrix.shard.name }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.9"

      - name: Install dependencies
        env:
          RUST_LOG: trace
        run: |
          uv venv
          uv pip install -e .[all] --verbose

      - name: Build source distribution
        run: |
          uv build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ./dist/*.tar.gz

  release:
    name: Release
    needs: [build_wheels, build_wheels_arm64, build_wheels_riscv64, build_sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
