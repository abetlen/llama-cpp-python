name: Tests
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  REPO_ID: lmstudio-community/Qwen3.5-0.8B-GGUF
  MODEL_FILE: Qwen3.5-0.8B-Q8_0.gguf
  RECURRENT_REPO_ID: QuantFactory/mamba-130m-hf-GGUF
  RECURRENT_MODEL_FILE: mamba-130m-hf.Q2_K.gguf
  HYBRID_REPO_ID: tiiuae/Falcon-H1-Tiny-90M-Instruct-GGUF
  HYBRID_MODEL_FILE: Falcon-H1-Tiny-90M-Instruct-Q2_K.gguf
  EMBEDDING_REPO_ID: CompendiumLabs/bge-small-en-v1.5-gguf
  EMBEDDING_MODEL_FILE: bge-small-en-v1.5-q4_k_m.gguf
  MODEL_CACHE_KEY: qwen35-q8-mamba130m-q2-falconh1tiny-q2-bge-small-q4

jobs:
  download-model:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install huggingface-hub
        run: pip install huggingface-hub
      - name: Restore model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-model-${{ env.MODEL_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-model-qwen35-q8-mamba130m-q2-falconh1tiny-q2
      - name: Download model
        run: |
          hf download ${{ env.REPO_ID }} ${{ env.MODEL_FILE }}
          hf download ${{ env.RECURRENT_REPO_ID }} ${{ env.RECURRENT_MODEL_FILE }}
          hf download ${{ env.HYBRID_REPO_ID }} ${{ env.HYBRID_MODEL_FILE }}
          hf download ${{ env.EMBEDDING_REPO_ID }} ${{ env.EMBEDDING_MODEL_FILE }}

  build-linux:
    needs: download-model
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Restore model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-model-${{ env.MODEL_CACHE_KEY }}
      - name: Install dependencies (Linux/MacOS)
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m uv pip install -e .[all] --verbose
        shell: bash
      - name: Test with pytest
        run: |
          python -m pytest

  build-windows:
    needs: download-model
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Restore model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-model-${{ env.MODEL_CACHE_KEY }}

      - name: Install dependencies (Windows)
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m uv pip install -e .[all] --verbose
        shell: cmd
          
      - name: Test with pytest
        run: |
          python -m pytest

  build-macos:
    needs: download-model
    runs-on: macos-15
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: System Info
        run: |
          uname -a
          sysctl -n machdep.cpu.brand_string
          python3 -c "import platform; print(platform.machine(), platform.architecture())"

      - name: Restore model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-model-${{ env.MODEL_CACHE_KEY }}
          
      - name: Install dependencies (Linux/MacOS)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv
          CMAKE_ARGS="-DGGML_NATIVE=off" python3 -m uv pip install -e .[all] --verbose
        shell: bash

      - name: Test with pytest
        run: |
          python3 -m pytest

  build-macos-intel:
    needs: download-model
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: System Info
        run: |
          uname -a
          sysctl -n machdep.cpu.brand_string
          python3 -c "import platform; print(platform.machine(), platform.architecture())"

      - name: Restore model cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-model-${{ env.MODEL_CACHE_KEY }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install .[all] --verbose
        shell: bash

      - name: Test with pytest
        run: |
          python3 -m pytest
